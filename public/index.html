<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"/>
<title>TEFA BAHAGIA DIGITAL PRINT — Kasir POS</title>
<meta name="description" content="Sistem Kasir & POS TEFA BAHAGIA DIGITAL PRINT — real-time, multi-device, cloud sync."/>
<meta name="theme-color" content="#1a56db"/>

<!-- PWA-ish: bisa di-add to home screen -->
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖨️</text></svg>"/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome (icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

<!-- App CSS -->
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- ============================================================
     LOGIN SCREEN
     ============================================================ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="img/logo-tefa.svg" alt="Logo" onerror="this.style.display='none'"/>
      <h1>TEFA BAHAGIA DIGITAL PRINT</h1>
      <p>Berkah &amp; Bahagia Dalam Setiap Cetakan</p>
    </div>
    <div class="login-form-group">
      <label>Username</label>
      <input id="l-user" type="text" placeholder="Masukkan username" autocomplete="username"/>
    </div>
    <div class="login-form-group">
      <label>Password</label>
      <input id="l-pass" type="password" placeholder="Masukkan password" autocomplete="current-password"/>
    </div>
    <div class="login-form-group">
      <label>Login Sebagai</label>
      <select id="l-role">
        <option value="admin">Admin</option>
        <option value="kasir">Kasir</option>
      </select>
    </div>
    <button class="login-btn" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Masuk</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ============================================================
     MAIN APP (after login)
     ============================================================ -->
<div id="app" style="display:none;">

  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="img/logo-tefa.svg" alt="Logo" onerror="this.style.display='none'"/>
        <div class="sidebar-logo-text">
          <h2>TEFA BAHAGIA</h2>
          <span>DIGITAL PRINT</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sb-avatar">U</div>
        <div class="sidebar-user-info">
          <span id="sb-name">-</span>
          <small id="sb-role-label">-</small>
        </div>
      </div>
    </div>
  </aside>

  <div id="main-content">
    <header id="topbar">
      <button class="topbar-hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="topbar-right">
        <span class="topbar-clock" id="clock-display">00:00:00</span>

        <div id="sync-status" class="btn-icon" style="width:auto;padding:0 10px;gap:6px;display:flex;cursor:pointer;" onclick="manualSync()" title="Klik untuk sinkronisasi manual">
          <i class="fa-solid fa-cloud-check"></i>
          <span style="font-size:11px;font-weight:600;white-space:nowrap;">Real-time</span>
        </div>

        <div class="topbar-badge btn-icon" onclick="showPage('notifications')" title="Notifikasi">
          <i class="fa-solid fa-bell"></i>
        </div>

        <div id="user-menu-wrap" style="position:relative;">
          <div id="topbar-user-btn" onclick="toggleUserMenu()" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 10px 5px 5px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);transition:all .2s;">
            <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#f59e0b,#fbbf24);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;" id="tb-avatar">U</div>
            <div style="text-align:left;line-height:1.2;display:none;" class="tb-name-wrap">
              <div style="font-size:12px;font-weight:700;color:var(--text);" id="tb-name">-</div>
              <div style="font-size:10px;color:var(--text3);" id="tb-role">-</div>
            </div>
            <i class="fa-solid fa-chevron-down" id="user-chevron" style="font-size:11px;color:var(--text3);transition:transform .2s;"></i>
          </div>

          <div id="user-dropdown" style="display:none;position:absolute;right:0;top:calc(100% + 8px);width:220px;background:#fff;border-radius:14px;box-shadow:var(--shadow-md);border:1.5px solid var(--border);padding:8px;z-index:300;">
            <div style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border);margin-bottom:6px;">
              <div style="width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#f59e0b,#fbbf24);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;" id="dd-avatar">U</div>
              <div>
                <div style="font-size:13px;font-weight:700;" id="dd-name">-</div>
                <div style="font-size:11px;color:var(--text3);" id="dd-role">-</div>
              </div>
            </div>
            <div class="user-dd-item" onclick="closeUserMenu();showPage('profil')"><i class="fa-solid fa-circle-user"></i> Profil Saya</div>
            <div class="user-dd-item" id="dd-settings-btn" onclick="closeUserMenu();showPage('pengaturan-toko')"><i class="fa-solid fa-store"></i> Profil Toko</div>
            <div class="user-dd-item" id="dd-backup-btn" onclick="closeUserMenu();exportBackup()"><i class="fa-solid fa-download"></i> Backup Data</div>
            <div class="user-dd-item" onclick="closeUserMenu();manualSync()"><i class="fa-solid fa-rotate"></i> Sinkronkan Sekarang</div>
            <div class="user-dd-item user-dd-logout" onclick="closeUserMenu();showLogoutModal()"><i class="fa-solid fa-right-from-bracket"></i> Keluar</div>
          </div>
        </div>
      </div>
    </header>

    <main id="page-content"></main>
  </div>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->

<!-- Firebase SDK (compat — tidak butuh bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<!-- App config & modules (urutan penting) -->
<script src="js/firebase-init.js"></script>
<script src="js/utils.js"></script>
<script src="js/data.js"></script>
<script src="js/sync.js"></script>
<script src="js/auth.js"></script>
<script src="js/router.js"></script>
<script src="js/page-dashboard.js"></script>
<script src="js/page-kasir.js"></script>
<script src="js/page-restock.js"></script>
<script src="js/page-laporan.js"></script>
<script src="js/page-master.js"></script>
<script src="js/page-pengaturan.js"></script>
<script src="js/app.js"></script>

</body>
</html>
